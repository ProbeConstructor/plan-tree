name: Release
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.release_id }}
    steps:
      - uses: actions/checkout@v4
      - id: create
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: context.ref.replace('refs/tags/', ''),
              name: context.ref.replace('refs/tags/', ''),
              body: [
                '### Plan Tree ' + context.ref.replace('refs/tags/', ''),
                '',
                'Descargá el asset correspondiente a tu sistema operativo:',
                '',
                '- **Linux**: `.AppImage` (portable)',
                '- **Windows**: `.exe` (instalador)',
                '- **macOS**: `.dmg` (app)',
              ].join('\n'),
              draft: true,
            });
            core.setOutput('release_id', data.id.toString());

  build:
    needs: [create-release]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable

      - name: install system deps (linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - run: npm ci

      - run: npm run build

      - uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseId: ${{ needs.create-release.outputs.release_id }}
          releaseDraft: true
          uploadUpdaterSignatures: true

      - name: Upload signature files
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          shopt -s nullglob
          for sig in src-tauri/target/release/bundle/*/*.sig; do
            echo "Uploading $sig..."
            gh release upload "${{ github.ref_name }}" "$sig" \
              --repo "${{ github.repository }}" --clobber
          done

  finalize:
    needs: [create-release, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p assets
          gh release download "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --dir assets

      - name: Generate latest.json
        id: generate
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const assetsDir = 'assets';
            const files = fs.readdirSync(assetsDir);

            // Group installers with their .sig files
            const installers = files.filter(f =>
              f.endsWith('.AppImage') || f.endsWith('.dmg') || f.endsWith('.exe')
            );

            const sigByBase = {};
            for (const f of files) {
              if (f.endsWith('.sig')) {
                const base = f.replace(/\.sig$/, '');
                sigByBase[base] = f;
              }
            }

            const tag = context.ref.replace('refs/tags/', '');
            const downloadUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/releases/download/${tag}`;

            const platformRules = [
              { pattern: /\.AppImage$/, key: 'linux-x86_64', sigExt: '.AppImage.sig' },
              { pattern: /\.dmg$/, key: 'darwin-aarch64', sigExt: '.dmg.sig' },
              { pattern: /\.exe$/, key: 'windows-x86_64', sigExt: '.exe.sig' },
            ];

            const platforms = {};

            for (const installer of installers) {
              for (const rule of platformRules) {
                if (rule.pattern.test(installer.name)) {
                  // Try exact .sig match: installer + .sig
                  const sigFile = installer + '.sig';
                  const sigPath = path.join(assetsDir, sigFile);
                  if (fs.existsSync(sigPath)) {
                    const signature = fs.readFileSync(sigPath, 'utf-8').trim();
                    platforms[rule.key] = {
                      url: downloadUrl + '/' + installer,
                      signature,
                    };
                    console.log(`✓ ${rule.key}: ${installer} + ${sigFile}`);
                  } else {
                    // Try matching via sigByBase (remove existing extension)
                    const baseNoExt = installer.replace(/\.(AppImage|dmg|exe)$/, '');
                    const matched = [baseNoExt + rule.sigExt, baseNoExt + '.sig', installer.replace(/\.(AppImage|dmg|exe)$/, '.sig')];
                    let found = null;
                    for (const m of matched) {
                      if (sigByBase[m.replace(/\.sig$/, '')] || sigByBase[m]) {
                        found = m;
                        break;
                      }
                    }
                    if (found) {
                      const signature = fs.readFileSync(path.join(assetsDir, sigByBase[found.replace(/\.sig$/, '')] || sigByBase[found]), 'utf-8').trim();
                      platforms[rule.key] = {
                        url: downloadUrl + '/' + installer,
                        signature,
                      };
                      console.log(`✓ ${rule.key}: ${installer} + ${found} (fallback match)`);
                    } else {
                      console.log(`⚠️  No signature for ${installer}, skipping ${rule.key}`);
                    }
                  }
                  break;
                }
              }
            }

            const version = tag.replace(/^v/, '');
            const latestJson = {
              version,
              notes: 'See release notes on GitHub',
              pub_date: new Date().toISOString(),
              platforms,
            };

            fs.writeFileSync('latest.json', JSON.stringify(latestJson, null, 2));
            console.log('\nGenerated latest.json:');
            console.log(JSON.stringify(latestJson, null, 2));

            // Fail if no platforms were included
            if (Object.keys(platforms).length === 0) {
              core.setFailed('No platform entries in latest.json — signatures missing');
            }

      - name: Upload latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" latest.json \
            --repo "${{ github.repository }}" --clobber
          echo "latest.json uploaded successfully"

      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --draft=false
