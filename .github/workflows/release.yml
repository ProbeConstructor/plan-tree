name: Release
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.release_id }}
    steps:
      - uses: actions/checkout@v4
      - id: create
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: tag,
              body: [
                '### Plan Tree ' + tag,
                '',
                'Descargá el asset correspondiente a tu sistema operativo:',
                '',
                '- **Linux**: `.AppImage` (portable)',
                '- **Windows**: `.exe` (installer)',
                '- **macOS**: `.dmg` (app)',
              ].join('\n'),
              draft: true,
            });
            core.setOutput('release_id', data.id.toString());

  build:
    needs: [create-release]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: install system deps (linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - run: npm ci

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build

      - name: Upload release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          shopt -s nullglob
          built=false
          # Ensure AppImage has execute permission (GitHub releases strip it)
          for appimage in src-tauri/target/release/bundle/*/*.AppImage; do
            [[ -f "$appimage" ]] || continue
            chmod +x "$appimage"
            echo "Set +x on: $appimage"
          done
          # Upload installers first
          for f in src-tauri/target/release/bundle/*/*.AppImage \
                    src-tauri/target/release/bundle/*/*.dmg \
                    src-tauri/target/release/bundle/*/*.exe \
                    src-tauri/target/release/bundle/*/*.msi \
                    src-tauri/target/release/bundle/*/*.deb \
                    src-tauri/target/release/bundle/*/*.rpm; do
            [[ -f "$f" ]] || continue
            echo "Uploading installer: $f..."
            gh release upload "${{ github.ref_name }}" "$f" \
              --repo "${{ github.repository }}" --clobber
            built=true
          done
          # Upload .sig files for every bundle type
          for sig in src-tauri/target/release/bundle/*/*.sig; do
            [[ -f "$sig" ]] || continue
            echo "Uploading signature: $sig..."
            gh release upload "${{ github.ref_name }}" "$sig" \
              --repo "${{ github.repository }}" --clobber
          done
          if [ "$built" = false ]; then
            echo "No installers found!"
            ls -la src-tauri/target/release/bundle/*/ 2>/dev/null || echo "No bundle dirs"
            exit 1
          fi

  finalize:
    needs: [create-release, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p assets
          gh release download "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --dir assets
          echo "Downloaded files:"
          ls -la assets/

      - name: Generate latest.json
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const assetsDir = 'assets';
            const files = fs.readdirSync(assetsDir);

            // Build a map: basename-without-ext -> installer file + sig file
            const installers = {};
            const sigs = {};

            for (const f of files) {
              const full = path.join(assetsDir, f);
              if (!fs.statSync(full).isFile()) continue;

              if (f.endsWith('.sig')) {
                const base = f.replace(/\.sig$/, '');
                sigs[base] = f;
              } else if (
                f.endsWith('.AppImage') ||
                f.endsWith('.dmg') ||
                f.endsWith('.exe') ||
                f.endsWith('.msi')
              ) {
                // Strip platform extension to get base name
                const base = f.replace(/\.(AppImage|dmg|exe|msi)$/, '');
                installers[base] = f;
              }
            }

            const tag = context.ref.replace('refs/tags/', '');
            const downloadUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/releases/download/${tag}`;

            const platformMap = [
              { match: /\.AppImage$/, key: 'linux-x86_64' },
              { match: /\.dmg$/, key: 'darwin-aarch64' },
              { match: /\.exe$/, key: 'windows-x86_64' },
              { match: /\.msi$/, key: 'windows-x86_64' },
            ];

            const platforms = {};
            const unmatched = [];

            for (const [base, installer] of Object.entries(installers)) {
              let matched = false;
              for (const rule of platformMap) {
                if (rule.match.test(installer)) {
                  // Try to find corresponding .sig: exact match first, then strip extra extension
                  let sigFile = sigs[installer]; // exact: installer + .sig
                  if (!sigFile) {
                    // Try the base name (without the installer extension)
                    sigFile = sigs[base];
                  }
                  if (!sigFile) {
                    // Try base + .sig 
                    sigFile = sigs[base + '.sig'];
                  }

                  if (sigFile) {
                    const sigPath = path.join(assetsDir, sigFile);
                    const signature = fs.readFileSync(sigPath, 'utf-8').trim();
                    platforms[rule.key] = {
                      url: downloadUrl + '/' + installer,
                      signature,
                    };
                    console.log(`✓ ${rule.key}: ${installer} ← ${sigFile}`);
                  } else {
                    console.log(`⚠️  No .sig found for ${installer} (tried: ${installer}.sig, ${base}.sig)`);
                  }
                  matched = true;
                  break;
                }
              }
              if (!matched) {
                unmatched.push(installer);
              }
            }

            if (unmatched.length > 0) {
              console.log(`Unrecognized installers: ${unmatched.join(', ')}`);
            }

            const version = tag.replace(/^v/, '');
            const pub_date = new Date().toISOString();
            const latestJson = { version, notes: '', pub_date, platforms };

            fs.writeFileSync('latest.json', JSON.stringify(latestJson, null, 2));
            console.log('\n=== latest.json ===');
            console.log(JSON.stringify(latestJson, null, 2));

            if (Object.keys(platforms).length === 0) {
              core.setFailed('No platform entries — signatures missing');
            }

      - name: Upload latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" latest.json \
            --repo "${{ github.repository }}" --clobber
          echo "✅ latest.json uploaded"

      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --draft=false
          echo "✅ Release published"
